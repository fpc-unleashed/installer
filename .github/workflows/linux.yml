name: Linux

on:
  workflow_dispatch:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install build dependencies
        run: |
          sudo rm -rf /var/lib/apt/lists/*
          sudo apt-get clean
          sudo apt-get update -o Acquire::Retries=3
          sudo apt-get install -y --no-install-recommends \
            unzip curl file desktop-file-utils \
            libgtk2.0-dev libcairo2-dev libpango1.0-dev \
            libgdk-pixbuf2.0-dev libatk1.0-dev libgl1-mesa-dev

      - name: Checkout installer
        uses: actions/checkout@v4

      - name: Download FPC Unleashed nightly bundle
        run: |
          curl -L -o fpc-bundle.zip https://github.com/fpc-unleashed/freepascal/releases/download/nightly/linux-bundle.zip
          unzip -q fpc-bundle.zip -d "$HOME"
          ls "$HOME/fpc/bin"

      - name: Write fpc.cfg
        run: |
          target=x86_64-linux
          {
            echo "# FPC Unleashed minimal config"
            for d in "$HOME/fpc/units/$target"/*/; do
              [ -d "$d" ] || continue
              echo "-Fu${d%/}"
            done
          } > "$HOME/.fpc.cfg"

      - name: Setup PATH
        run: echo "$HOME/fpc/bin" >> $GITHUB_PATH

      - name: Smoke-test FPC
        run: |
          echo "begin writeln('hello'); end." > /tmp/hello.pas
          "$HOME/fpc/bin/ppcx64" -viq /tmp/hello.pas
          /tmp/hello

      - name: Download Lazarus Unleashed nightly bundle
        run: |
          curl -L -o laz-bundle.zip https://github.com/fpc-unleashed/lazarus/releases/download/nightly/linux-bundle.zip
          mkdir -p "$HOME/laz"
          unzip -q laz-bundle.zip -d "$HOME/laz"
          chmod +x "$HOME/laz/lazbuild" "$HOME/laz/lazarus" "$HOME/laz/startlazarus" 2>/dev/null || true
          test -x "$HOME/laz/lazbuild"

      - name: Bump BuildNr to run number
        run: |
          # Lazarus omits <BuildNr> when it equals the default 0, so the
          # element may be absent in the committed .lpi. Insert it before
          # </VersionInfo> when missing, otherwise replace the existing value.
          n="${GITHUB_RUN_NUMBER}"
          if grep -q '<BuildNr Value=' src/installer.lpi; then
            sed -i "s|<BuildNr Value=\"[0-9]\+\"/>|<BuildNr Value=\"${n}\"/>|" src/installer.lpi
          else
            sed -i "s|</VersionInfo>|  <BuildNr Value=\"${n}\"/>\n    </VersionInfo>|" src/installer.lpi
          fi
          grep '<BuildNr' src/installer.lpi

      - name: Build installer ELF
        run: |
          "$HOME/laz/lazbuild" --lazarusdir="$HOME/laz" --build-mode=linux64_release --ws=gtk2 src/installer.lpi
          test -x installer_linux_x86_64

      - name: Upload installer_linux_x86_64
        uses: actions/upload-artifact@v4
        with:
          name: installer_linux_x86_64
          path: installer_linux_x86_64
          retention-days: 7

      - name: Download appimagetool
        run: |
          curl -L -o appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool

      - name: Assemble AppDir
        run: |
          mkdir -p Installer.AppDir
          cp installer_linux_x86_64 Installer.AppDir/
          # AppImage spec: the icon listed in the .desktop's Icon= field
          # (no extension) must exist as <Icon>.png at the AppDir root.
          # .DirIcon is what file managers extract and render.
          cp src/installer.png Installer.AppDir/installer.png
          ln -s installer.png Installer.AppDir/.DirIcon
          cat > Installer.AppDir/installer.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=FPC Unleashed Installer
          Comment=Builds FPC + Lazarus from upstream sources
          Exec=installer_linux_x86_64
          Icon=installer
          Categories=Development;
          Terminal=false
          EOF
          # AppRun is the entry point invoked when the AppImage runs.
          # A symlink to the ELF is the minimal valid form.
          ln -s installer_linux_x86_64 Installer.AppDir/AppRun
          ls -la Installer.AppDir/

      - name: Pack into AppImage
        env:
          ARCH: x86_64
        run: |
          # --appimage-extract-and-run avoids the FUSE dependency, which
          # the GitHub Actions ubuntu-latest runner does not provide.
          ./appimagetool --appimage-extract-and-run \
            Installer.AppDir installer_linux_x86_64.AppImage
          test -f installer_linux_x86_64.AppImage
          file installer_linux_x86_64.AppImage
          chmod +x installer_linux_x86_64.AppImage

      - name: Upload installer_linux_x86_64.AppImage
        uses: actions/upload-artifact@v4
        with:
          name: installer_linux_x86_64.AppImage
          path: installer_linux_x86_64.AppImage
          retention-days: 7
